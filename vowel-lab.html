<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ──────────────── 상수 ──────────────── */
const FFT_SIZE = 2048;
const SMOOTHING = 0.8;
const MIN_DB = -90;
const MAX_DB = -10;
const PITCH_MIN_HZ = 80;
const PITCH_MAX_HZ = 1200;
const FORMANT_MAX_HZ = 5000;
const F1_RANGE = [250, 1100];
const F2_RANGE = [800, 3500];
const LPC_ORDER = 14;
const LPC_MAX_BANDWIDTH = 900;

/* ──────────────── 컬러맵 (스펙트로그램) ──────────────── */
function dbToColor(db) {
  const t = Math.max(0, Math.min(1, (db - MIN_DB) / (MAX_DB - MIN_DB)));
  if (t < 0.25) {
    const s = t / 0.25;
    return `rgb(${Math.round(10 + s * 20)}, ${Math.round(10 + s * 30)}, ${Math.round(40 + s * 80)})`;
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    return `rgb(${Math.round(30 + s * 80)}, ${Math.round(40 + s * 100)}, ${Math.round(120 + s * 80)})`;
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    return `rgb(${Math.round(110 + s * 145)}, ${Math.round(140 + s * 80)}, ${Math.round(200 - s * 120)})`;
  } else {
    const s = (t - 0.75) / 0.25;
    return `rgb(255, ${Math.round(220 - s * 120)}, ${Math.round(80 - s * 70)})`;
  }
}

/* ──────────────── 피치 감지 (자기상관) ──────────────── */
function detectPitch(buffer, sampleRate) {
  const n = buffer.length;
  const minLag = Math.floor(sampleRate / PITCH_MAX_HZ);
  const maxLag = Math.ceil(sampleRate / PITCH_MIN_HZ);

  let sumSq = 0;
  for (let i = 0; i < n; i++) sumSq += buffer[i] * buffer[i];
  const rms = Math.sqrt(sumSq / n);
  if (rms < 0.01) return null;

  // NSDF
  let bestVal = -Infinity, bestLag = -1;
  for (let lag = minLag; lag <= maxLag && lag < n; lag++) {
    let corr = 0, norm = 0;
    for (let i = 0; i < n - lag; i++) {
      corr += buffer[i] * buffer[i + lag];
      norm += buffer[i] * buffer[i] + buffer[i + lag] * buffer[i + lag];
    }
    const nsdf = norm > 0 ? 2 * corr / norm : 0;
    if (nsdf > bestVal) { bestVal = nsdf; bestLag = lag; }
  }
  if (bestVal < 0.5 || bestLag < 0) return null;
  return sampleRate / bestLag;
}

/* ──────────────── Hz → 노트 이름 ──────────────── */
function hzToNote(hz) {
  if (!hz) return '';
  const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const midi = Math.round(12 * Math.log2(hz / 440) + 69);
  const name = noteNames[((midi % 12) + 12) % 12];
  const oct = Math.floor(midi / 12) - 1;
  return `${name}${oct}`;
}


/* ──────────────── LPC 기반 F1/F2 추정 + FFT fallback ────────────────
   주의: 브라우저 실시간 분석용 간이 LPC입니다.
   레슨용 비교/시각화에는 유용하지만, 연구용 정밀 포먼트 값으로 확정하면 안 됩니다. */
function findPeakInRange(freqData, sampleRate, fftSize, minHz, maxHz, minStrength = 18) {
  const binHz = sampleRate / fftSize;
  const start = Math.max(1, Math.floor(minHz / binHz));
  const end = Math.min(freqData.length - 2, Math.ceil(maxHz / binHz));
  let bestBin = -1;
  let bestVal = -Infinity;
  for (let i = start; i <= end; i++) {
    const smoothed = (freqData[i - 1] + freqData[i] * 2 + freqData[i + 1]) / 4;
    const isLocalPeak = freqData[i] >= freqData[i - 1] && freqData[i] >= freqData[i + 1];
    if (isLocalPeak && smoothed > bestVal) { bestVal = smoothed; bestBin = i; }
  }
  if (bestBin < 0 || bestVal < minStrength) return null;
  return { hz: bestBin * binHz, strength: bestVal, source: 'FFT' };
}

function estimateFormantsFFT(freqData, sampleRate, fftSize, pitch) {
  const f1Min = pitch ? Math.max(F1_RANGE[0], pitch * 1.15) : F1_RANGE[0];
  const f1 = findPeakInRange(freqData, sampleRate, fftSize, f1Min, F1_RANGE[1], 20);
  const f2Min = f1 ? Math.max(F2_RANGE[0], f1.hz + 250) : F2_RANGE[0];
  const f2 = findPeakInRange(freqData, sampleRate, fftSize, f2Min, F2_RANGE[1], 18);
  return { f1: f1 ? f1.hz : null, f2: f2 ? f2.hz : null, f1Bandwidth: null, f2Bandwidth: null, source: 'FFT fallback', f1Strength: f1 ? f1.strength : 0, f2Strength: f2 ? f2.strength : 0 };
}

function levinsonDurbin(r, order) {
  if (!r[0] || !isFinite(r[0])) return null;
  const a = new Array(order + 1).fill(0); a[0] = 1;
  let e = r[0];
  for (let i = 1; i <= order; i++) {
    let acc = r[i];
    for (let j = 1; j < i; j++) acc += a[j] * r[i - j];
    const k = -acc / e;
    if (!isFinite(k) || Math.abs(k) > 1.05) return null;
    const next = a.slice();
    for (let j = 1; j < i; j++) next[j] = a[j] + k * a[i - j];
    next[i] = k;
    for (let j = 1; j <= i; j++) a[j] = next[j];
    e *= (1 - k * k);
    if (e <= 1e-9) return null;
  }
  return a;
}

function polyEval(coeffs, z) {
  let out = { re: coeffs[0], im: 0 };
  for (let i = 1; i < coeffs.length; i++) {
    const re = out.re * z.re - out.im * z.im + coeffs[i];
    const im = out.re * z.im + out.im * z.re;
    out = { re, im };
  }
  return out;
}
function complexDiv(a, b) {
  const den = b.re * b.re + b.im * b.im || 1e-12;
  return { re: (a.re * b.re + a.im * b.im) / den, im: (a.im * b.re - a.re * b.im) / den };
}
function durandKerner(coeffs, maxIter = 70) {
  const n = coeffs.length - 1;
  const roots = [];
  const radius = 0.72;
  for (let i = 0; i < n; i++) {
    const theta = (2 * Math.PI * i) / n;
    roots.push({ re: radius * Math.cos(theta), im: radius * Math.sin(theta) });
  }
  for (let iter = 0; iter < maxIter; iter++) {
    let maxDelta = 0;
    for (let i = 0; i < n; i++) {
      let denom = { re: 1, im: 0 };
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const diff = { re: roots[i].re - roots[j].re, im: roots[i].im - roots[j].im };
        const re = denom.re * diff.re - denom.im * diff.im;
        const im = denom.re * diff.im + denom.im * diff.re;
        denom = { re, im };
      }
      const delta = complexDiv(polyEval(coeffs, roots[i]), denom);
      roots[i] = { re: roots[i].re - delta.re, im: roots[i].im - delta.im };
      maxDelta = Math.max(maxDelta, Math.hypot(delta.re, delta.im));
    }
    if (maxDelta < 1e-7) break;
  }
  return roots;
}

function estimateFormantsLPC(timeData, sampleRate, pitch) {
  const n = timeData.length;
  let rms = 0;
  for (let i = 0; i < n; i++) rms += timeData[i] * timeData[i];
  rms = Math.sqrt(rms / n);
  if (rms < 0.01) return null;
  const x = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const pre = i === 0 ? timeData[i] : timeData[i] - 0.97 * timeData[i - 1];
    const win = 0.54 - 0.46 * Math.cos((2 * Math.PI * i) / (n - 1));
    x[i] = pre * win;
  }
  const order = Math.min(LPC_ORDER, Math.floor(sampleRate / 3500) + 8);
  const r = new Array(order + 1).fill(0);
  for (let lag = 0; lag <= order; lag++) {
    let sum = 0;
    for (let i = 0; i < n - lag; i++) sum += x[i] * x[i + lag];
    r[lag] = sum;
  }
  const a = levinsonDurbin(r, order);
  if (!a) return null;
  const roots = durandKerner(a);
  const candidates = [];
  for (const z of roots) {
    if (z.im <= 0) continue;
    const mag = Math.hypot(z.re, z.im);
    if (mag <= 0.05 || mag >= 1.2) continue;
    const angle = Math.atan2(z.im, z.re);
    const hz = angle * sampleRate / (2 * Math.PI);
    const bandwidth = -0.5 * (sampleRate / Math.PI) * Math.log(Math.max(mag, 1e-9));
    if (hz >= 150 && hz <= 5000 && bandwidth > 30 && bandwidth < LPC_MAX_BANDWIDTH) candidates.push({ hz, bandwidth });
  }
  candidates.sort((a, b) => a.hz - b.hz);
  const f1Min = pitch ? Math.max(F1_RANGE[0], pitch * 1.08) : F1_RANGE[0];
  const f1 = candidates.find(c => c.hz >= f1Min && c.hz <= F1_RANGE[1]);
  const f2Min = f1 ? Math.max(F2_RANGE[0], f1.hz + 250) : F2_RANGE[0];
  const f2 = candidates.find(c => c.hz >= f2Min && c.hz <= F2_RANGE[1]);
  if (!f1 && !f2) return null;
  return { f1: f1 ? f1.hz : null, f2: f2 ? f2.hz : null, f1Bandwidth: f1 ? f1.bandwidth : null, f2Bandwidth: f2 ? f2.bandwidth : null, source: 'LPC', f1Strength: 0, f2Strength: 0 };
}

function estimateFormants(freqData, timeData, sampleRate, fftSize, pitch) {
  const lpc = estimateFormantsLPC(timeData, sampleRate, pitch);
  const fft = estimateFormantsFFT(freqData, sampleRate, fftSize, pitch);
  return { f1: (lpc && lpc.f1) || fft.f1, f2: (lpc && lpc.f2) || fft.f2, f1Bandwidth: lpc ? lpc.f1Bandwidth : null, f2Bandwidth: lpc ? lpc.f2Bandwidth : null, source: lpc ? 'LPC' : 'FFT fallback', f1Strength: fft.f1Strength, f2Strength: fft.f2Strength };
}

function computeVoiceStrategy(freqData, sampleRate, fftSize, pitch, db, formants) {
  const binHz = sampleRate / fftSize;
  let low = 0, mid = 0, high = 0, weighted = 0, total = 0;
  for (let i = 1; i < freqData.length; i++) {
    const hz = i * binHz;
    if (hz > FORMANT_MAX_HZ) break;
    const amp = freqData[i] / 255;
    const energy = amp * amp;
    if (hz < 1000) low += energy;
    else if (hz < 2500) mid += energy;
    else high += energy;
    weighted += hz * energy;
    total += energy;
  }
  const highRatio = total ? high / total : 0;
  const midHighRatio = total ? (mid + high) / total : 0;
  const centroid = total ? weighted / total : 0;
  const f1f0 = pitch && formants.f1 ? formants.f1 / pitch : null;

  // 하모닉스 에너지: F0 정수배 주변 ±35Hz의 상대 에너지
  let harmonicEnergy = 0, harmonicCount = 0;
  if (pitch) {
    const maxH = Math.min(16, Math.floor(FORMANT_MAX_HZ / pitch));
    for (let h = 2; h <= maxH; h++) {
      const center = pitch * h;
      const lo = Math.max(1, Math.floor((center - 35) / binHz));
      const hi = Math.min(freqData.length - 1, Math.ceil((center + 35) / binHz));
      let local = 0;
      for (let b = lo; b <= hi; b++) {
        const amp = freqData[b] / 255;
        local = Math.max(local, amp * amp);
      }
      harmonicEnergy += local;
      harmonicCount++;
    }
  }
  const harmonicRichness = harmonicCount ? harmonicEnergy / harmonicCount : 0;

  // 벨팅/믹스 확정 판정이 아니라 참고 점수입니다.
  const loudnessPart = Math.max(0, Math.min(1, (db + 50) / 35));
  const highPart = Math.max(0, Math.min(1, (highRatio - 0.10) / 0.22));
  const centroidPart = Math.max(0, Math.min(1, (centroid - 1000) / 2200));
  const harmonicPart = Math.max(0, Math.min(1, (harmonicRichness - 0.07) / 0.22));
  const beltScore = Math.round((loudnessPart * 0.25 + highPart * 0.35 + centroidPart * 0.20 + harmonicPart * 0.20) * 100);

  let label = '관찰 중';
  let hint = '소리를 조금 더 안정적으로 내면 참고 지표가 표시됩니다.';
  if (total > 0.001 && db > -55) {
    if (beltScore >= 65) {
      label = '벨팅 쪽 에너지 강함';
      hint = '음량과 2.5kHz 이상 고주파 에너지가 강하게 나타납니다. 단, 이것만으로 벨팅 확정은 아닙니다.';
    } else if (beltScore <= 40) {
      label = '믹스/라이트 쪽 가능성';
      hint = '고주파 에너지가 상대적으로 낮거나 분산되어 보입니다. 모음 변화와 청지각을 같이 보세요.';
    } else {
      label = '중간 전략';
      hint = '믹스와 벨팅 사이의 과도 구간일 수 있습니다. 같은 음에서 모음·음량을 바꿔 비교하세요.';
    }
  }

  return { highRatio, midHighRatio, centroid, f1f0, harmonicRichness, loudnessPart, highPart, centroidPart, harmonicPart, beltScore, label, hint };
}

/* ──────────────── 메인 앱 ──────────────── */

function nextPow2(n){let p=1; while(p<n)p<<=1; return p;}
function fftMagnitude(input, sampleRate, fftSize=FFT_SIZE){
  const n=fftSize, re=new Float64Array(n), im=new Float64Array(n);
  const len=Math.min(input.length,n);
  for(let i=0;i<len;i++){ const win=0.54-0.46*Math.cos(2*Math.PI*i/(n-1)); re[i]=input[i]*win; }
  for(let i=1,j=0;i<n;i++){
    let bit=n>>1; for(; j&bit; bit>>=1) j^=bit; j^=bit;
    if(i<j){ let tr=re[i]; re[i]=re[j]; re[j]=tr; let ti=im[i]; im[i]=im[j]; im[j]=ti; }
  }
  for(let len2=2; len2<=n; len2<<=1){
    const ang=-2*Math.PI/len2, wlenR=Math.cos(ang), wlenI=Math.sin(ang);
    for(let i=0;i<n;i+=len2){ let wr=1, wi=0; for(let j=0;j<len2/2;j++){
      const uR=re[i+j], uI=im[i+j];
      const vR=re[i+j+len2/2]*wr-im[i+j+len2/2]*wi;
      const vI=re[i+j+len2/2]*wi+im[i+j+len2/2]*wr;
      re[i+j]=uR+vR; im[i+j]=uI+vI; re[i+j+len2/2]=uR-vR; im[i+j+len2/2]=uI-vI;
      const nwr=wr*wlenR-wi*wlenI; wi=wr*wlenI+wi*wlenR; wr=nwr;
    }}
  }
  const out=new Uint8Array(n/2);
  for(let i=0;i<n/2;i++){
    const mag=Math.sqrt(re[i]*re[i]+im[i]*im[i])/(n/2);
    const db=20*Math.log10(mag+1e-8);
    out[i]=Math.max(0, Math.min(255, Math.round((db-MIN_DB)/(MAX_DB-MIN_DB)*255)));
  }
  return out;
}
function mergeChunks(chunks){
  const len=chunks.reduce((a,c)=>a+c.length,0); const out=new Float32Array(len); let off=0;
  chunks.forEach(c=>{out.set(c,off); off+=c.length;}); return out;
}
function wavBlobFromFloat32(samples, sampleRate){
  const wavBuf=new ArrayBuffer(44+samples.length*2); const view=new DataView(wavBuf);
  const writeStr=(off,s)=>{for(let i=0;i<s.length;i++)view.setUint8(off+i,s.charCodeAt(i));};
  writeStr(0,'RIFF'); view.setUint32(4,36+samples.length*2,true); writeStr(8,'WAVE'); writeStr(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true); writeStr(36,'data'); view.setUint32(40,samples.length*2,true);
  for(let i=0;i<samples.length;i++) view.setInt16(44+i*2, Math.max(-32768,Math.min(32767,samples[i]*32767)), true);
  return new Blob([wavBuf],{type:'audio/wav'});
}
function analyseSegment(samples, sampleRate){
  if(!samples || samples.length<512) return null;
  const frame=FFT_SIZE, hop=1024, maxFrames=42; const step=Math.max(hop, Math.floor((samples.length-frame)/maxFrames));
  let pitchSum=0,pitchN=0, dbSum=0, f1Sum=0,f1N=0,f2Sum=0,f2N=0, highSum=0,centSum=0,beltSum=0,stratN=0;
  for(let start=0; start+frame<=samples.length; start+=Math.max(1,step)){
    const buf=samples.slice(start,start+frame);
    let ss=0; for(let i=0;i<buf.length;i++) ss+=buf[i]*buf[i];
    const rms=Math.sqrt(ss/buf.length); const db=rms>0?20*Math.log10(rms):-90; dbSum+=db;
    const pitch=detectPitch(buf,sampleRate); if(pitch){pitchSum+=pitch; pitchN++;}
    const freqData=fftMagnitude(buf,sampleRate,frame);
    const formants=estimateFormants(freqData,buf,sampleRate,frame,pitch);
    if(formants.f1){f1Sum+=formants.f1; f1N++;} if(formants.f2){f2Sum+=formants.f2; f2N++;}
    const strat=computeVoiceStrategy(freqData,sampleRate,frame,pitch,db,formants);
    highSum+=strat.highRatio||0; centSum+=strat.centroid||0; beltSum+=strat.beltScore||0; stratN++;
    if(stratN>=maxFrames) break;
  }
  const dur=samples.length/sampleRate;
  const avgPitch=pitchN?pitchSum/pitchN:null;
  const f1=f1N?f1Sum/f1N:null, f2=f2N?f2Sum/f2N:null;
  const vowel=vowelGuess(f1,f2);
  return { duration:dur, avgF0:avgPitch, note: avgPitch?hzToNote(avgPitch):'—', avgDb:dbSum/(stratN||1), f1, f2, vowel, highRatio:highSum/(stratN||1), centroid:centSum/(stratN||1), beltScore:Math.round(beltSum/(stratN||1)), frames:stratN };
}
function diffText(a,b,key,unit='',digits=0){
  if(!a||!b||a[key]==null||b[key]==null) return '—';
  const d=b[key]-a[key]; const sign=d>0?'+':''; return `${sign}${d.toFixed(digits)}${unit}`;
}


const SLOT_ORDER=['A','B','C','D','E'];
const SLOT_COLORS={A:'#6eb5ff',B:'#ff6b9d',C:'#ffd166',D:'#7cffb2',E:'#b388ff'};
function emptySlots(){
  const obj={}; SLOT_ORDER.forEach(k=>obj[k]={selection:null,analysis:null}); return obj;
}
function nextSlotName(name){
  const i=SLOT_ORDER.indexOf(name); return SLOT_ORDER[(i+1)%SLOT_ORDER.length];
}
const VOWEL_PROFILES = [
  { name:'아', f1:820, f2:1150, hint:'열린 모음 · 벨팅/강한 소리에 유리' },
  { name:'어', f1:650, f2:1300, hint:'중간 열린 모음 · 아보다 덜 열림' },
  { name:'에/애', f1:560, f2:2200, hint:'앞쪽 중간 모음 · 밝게 모임' },
  { name:'이', f1:330, f2:2800, hint:'닫힌 앞모음 · F2가 높음' },
  { name:'오', f1:420, f2:900, hint:'뒤쪽 둥근 모음 · F2가 낮아짐' },
  { name:'우', f1:300, f2:700, hint:'가장 닫힌 뒤모음 · F1/F2 모두 낮음' },
];
function vowelGuess(f1, f2){
  if(!f1 || !f2) return {label:'—', confidence:0, second:'—', hint:'F1/F2가 잡히면 표시됩니다.', scores:[]};
  const scored = VOWEL_PROFILES.map(v=>{
    const d1=(f1-v.f1)/260;
    const d2=(f2-v.f2)/850;
    const dist=Math.sqrt(d1*d1+d2*d2);
    return {...v, dist, score: Math.exp(-dist*dist/2)};
  }).sort((a,b)=>a.dist-b.dist);
  const total=scored.reduce((a,v)=>a+v.score,0)||1;
  const top=scored[0], second=scored[1];
  const conf=Math.round((top.score/total)*100);
  return {label:top.name, confidence:conf, second:second?.name||'—', hint:top.hint, scores:scored.map(v=>({name:v.name,pct:Math.round(v.score/total*100)}))};
}
function vowelLabel(f1,f2){
  const v=vowelGuess(f1,f2);
  return v.label==='—'?'—':`${v.label} ${v.confidence}%`;
}
function fmtVal(res,key){
  if(!res) return '—';
  if(key==='duration') return `${res.duration.toFixed(2)}s`;
  if(key==='avgF0') return res.avgF0?`${Math.round(res.avgF0)} Hz (${res.note})`:'—';
  if(key==='avgDb') return `${Math.round(res.avgDb)} dB`;
  if(key==='f1') return res.f1?`${Math.round(res.f1)} Hz`:'—';
  if(key==='f2') return res.f2?`${Math.round(res.f2)} Hz`:'—';
  if(key==='highRatio') return `${Math.round(res.highRatio*100)}%`;
  if(key==='beltScore') return `${res.beltScore}`;
  if(key==='vowel') return res.vowel?`${res.vowel.label} ${res.vowel.confidence}%`:'—';
  return '—';
}


function reliabilityMessages(db, pitch, formants){
  const messages=[];
  if(db < -55) messages.push('소리가 작아 분석 신뢰도가 낮습니다.');
  if(!pitch) messages.push('음높이가 안정적으로 감지되지 않습니다.');
  if(!formants || !formants.f1 || !formants.f2) messages.push('포먼트 추정이 불안정합니다.');
  if(messages.length===0) messages.push('현재 입력은 비교적 안정적으로 분석되고 있습니다.');
  return messages;
}
function buildLiveInterpretation(pitch, db, formants, strategy){
  const v=vowelGuess(formants?.f1, formants?.f2);
  const lines=[];
  if(v.label!=='—') lines.push(`현재 소리는 ‘${v.label}’에 가깝게 추정됩니다. 신뢰도는 약 ${v.confidence}%입니다.`);
  else lines.push('F1/F2가 안정적으로 잡히면 모음 추정이 표시됩니다.');
  if(formants?.f1){
    if(formants.f1>=700) lines.push('F1이 높은 편이라 입이 비교적 열린 모음 성향으로 보입니다.');
    else if(formants.f1<=420) lines.push('F1이 낮은 편이라 입이 비교적 닫힌 모음 성향으로 보입니다.');
    else lines.push('F1은 중간 영역에 있어 과하게 열리거나 닫힌 상태로 보이지 않습니다.');
  }
  if(formants?.f2){
    if(formants.f2>=2000) lines.push('F2가 높아 앞쪽/밝은 모음 성향이 강합니다.');
    else if(formants.f2<=1100) lines.push('F2가 낮아 뒤쪽/둥근 모음 성향이 강합니다.');
    else lines.push('F2는 중간 영역에 있어 앞쪽과 뒤쪽 성향이 섞여 보입니다.');
  }
  if(strategy?.beltScore>=65) lines.push('고역 에너지와 음량이 강하게 나타나지만, 이것만으로 벨팅 확정 판정은 아닙니다.');
  else if(strategy?.beltScore<=40) lines.push('고역 에너지가 상대적으로 낮아 가벼운 믹스/라이트 전략일 가능성이 있습니다.');
  else lines.push('현재 소리는 믹스와 강한 전략 사이의 중간 구간으로 볼 수 있습니다.');
  return lines;
}
function compareWarnings(slots){
  const ready=SLOT_ORDER.map(k=>slots[k].analysis).filter(Boolean);
  const msgs=[];
  const f0s=ready.map(r=>r.avgF0).filter(Boolean);
  if(f0s.length>=2 && Math.max(...f0s)-Math.min(...f0s)>35) msgs.push('A~E 구간의 평균 F0 차이가 커서 모음/공명 비교가 어려울 수 있습니다. 가능하면 같은 음높이에서 비교하세요.');
  const dbs=ready.map(r=>r.avgDb).filter(v=>v!=null);
  if(dbs.length>=2 && Math.max(...dbs)-Math.min(...dbs)>10) msgs.push('구간별 음량 차이가 큽니다. 벨팅 힌트나 고역 에너지는 음량 영향도 함께 받습니다.');
  if(!msgs.length) msgs.push('저장된 구간들은 비교용으로 사용할 수 있습니다. 단, 수치는 레슨용 참고 지표입니다.');
  return msgs;
}

/* ──────────────── 레슨용 자동 피드백 로직 ──────────────── */
function generateLessonFeedback(oldRes, newRes, oldName, newName) {
  const feedback = [];
  if (!oldRes || !newRes) {
    return [{ type:'warn', text:'비교할 구간을 먼저 선택해주세요. A~E 구간을 녹음 파형에서 드래그해 저장하면 자동 피드백이 생성됩니다.', color:'#6a6a88' }];
  }
  // F0 차이
  if (oldRes.avgF0 && newRes.avgF0) {
    const d = Math.abs(newRes.avgF0 - oldRes.avgF0);
    if (d >= 30)      feedback.push({ type:'warn',    text:`두 구간의 평균 음높이 차이가 커서(약 ${Math.round(d)}Hz) 직접 비교에는 주의가 필요합니다. 가능하면 같은 음높이에서 다시 비교해보세요.`, color:'#ffd166' });
    else if (d <= 15) feedback.push({ type:'good',    text:'두 구간의 음높이가 비교적 비슷해, 모음과 에너지 변화를 비교하기 좋은 조건입니다.', color:'#7cffb2' });
  }
  // 포먼트
  const hasF = oldRes.f1 && newRes.f1 && oldRes.f2 && newRes.f2;
  if (!hasF) {
    feedback.push({ type:'info', text:'포먼트 추정값이 부족해 모음 관련 피드백은 제한됩니다.', color:'#6a6a88' });
  } else {
    const f1d = newRes.f1 - oldRes.f1;
    if (f1d > 80)       feedback.push({ type:'info',    text:`F1이 높아졌습니다(${oldName} ${Math.round(oldRes.f1)}Hz → ${newName} ${Math.round(newRes.f1)}Hz). 입이 더 열린 방향으로 조정되었고, /아/ 계열에 가까워졌을 가능성이 있습니다.`, color:'#6eb5ff' });
    else if (f1d < -80) feedback.push({ type:'info',    text:`F1이 낮아졌습니다(${oldName} ${Math.round(oldRes.f1)}Hz → ${newName} ${Math.round(newRes.f1)}Hz). 입이 덜 열린 방향으로 바뀌었고, 소리가 조금 더 모인 느낌으로 변했을 수 있습니다.`, color:'#6eb5ff' });
    else                feedback.push({ type:'neutral', text:'F1 변화는 크지 않습니다. 입의 열림 정도는 비교적 비슷하게 유지된 것으로 보입니다.', color:'#a5a5ba' });
    const f2d = newRes.f2 - oldRes.f2;
    if (f2d > 150)       feedback.push({ type:'info',    text:`F2가 높아졌습니다(${oldName} ${Math.round(oldRes.f2)}Hz → ${newName} ${Math.round(newRes.f2)}Hz). 혀가 앞쪽으로 이동한 모음 성향이 강해지고, 소리가 더 밝게 느껴질 수 있습니다.`, color:'#ffd166' });
    else if (f2d < -150) feedback.push({ type:'info',    text:`F2가 낮아졌습니다(${oldName} ${Math.round(oldRes.f2)}Hz → ${newName} ${Math.round(newRes.f2)}Hz). 혀가 뒤쪽으로 이동한 모음 성향이 강해지고, 소리가 더 둥글거나 어둡게 느껴질 수 있습니다.`, color:'#ffd166' });
    else                 feedback.push({ type:'neutral', text:'F2 변화는 크지 않습니다. 모음의 앞뒤 위치는 비교적 비슷하게 유지된 것으로 보입니다.', color:'#a5a5ba' });
  }
  // 고역 에너지
  const hd = newRes.highRatio - oldRes.highRatio;
  if (hd > 0.05)       feedback.push({ type:'info', text:`2.5kHz 이상 고역 에너지가 증가했습니다(${oldName} ${Math.round(oldRes.highRatio*100)}% → ${newName} ${Math.round(newRes.highRatio*100)}%). 소리가 더 선명하거나 앞으로 나오는 느낌이 강해졌을 수 있습니다.`, color:'#ff6b9d' });
  else if (hd < -0.05) feedback.push({ type:'info', text:`고역 에너지가 줄어들었습니다(${oldName} ${Math.round(oldRes.highRatio*100)}% → ${newName} ${Math.round(newRes.highRatio*100)}%). 소리가 더 부드럽거나 덜 날카롭게 들릴 가능성이 있습니다.`, color:'#ff6b9d' });
  // 벨팅 힌트
  const bd = newRes.beltScore - oldRes.beltScore;
  if (bd > 10)       feedback.push({ type:'info', text:`벨팅 힌트 점수가 올라갔습니다(${oldName} ${oldRes.beltScore} → ${newName} ${newRes.beltScore}). 음량, 고역 에너지, 하모닉스가 더 강한 방향으로 변화한 것으로 보입니다. 단, 이것만으로 벨팅을 확정할 수는 없습니다.`, color:'#7cffb2' });
  else if (bd < -10) feedback.push({ type:'info', text:`벨팅 힌트 점수가 낮아졌습니다(${oldName} ${oldRes.beltScore} → ${newName} ${newRes.beltScore}). 소리가 더 가볍거나 믹스/라이트한 방향으로 변화했을 가능성이 있습니다.`, color:'#7cffb2' });
  // 모음 추정
  const ol = oldRes.vowel?.label, nl = newRes.vowel?.label;
  if (ol && nl && ol !== '—' && nl !== '—') {
    if (ol !== nl) feedback.push({ type:'info',    text:`모음 추정이 '${ol}'에서 '${nl}' 쪽으로 이동했습니다. 실제 발음이 바뀌었거나, 같은 모음 안에서 튜닝이 달라졌을 수 있습니다.`, color:'#b388ff' });
    else           feedback.push({ type:'neutral', text:`모음 추정은 '${ol}' 계열로 유지되었습니다. 큰 모음 변화보다는 에너지나 음색 변화가 중심일 수 있습니다.`, color:'#a5a5ba' });
  }
  return feedback;
}

/* ──────────────── 레슨용 자동 피드백 UI 컴포넌트 ──────────────── */
function LessonFeedbackPanel({ slots, slotNames }) {
  const [compareFrom, setCompareFrom] = React.useState('A');
  const [compareTo,   setCompareTo]   = React.useState('B');
  const pairs = [];
  for (let i = 0; i < SLOT_ORDER.length; i++)
    for (let j = i + 1; j < SLOT_ORDER.length; j++)
      pairs.push([SLOT_ORDER[i], SLOT_ORDER[j]]);
  const oldRes  = slots[compareFrom]?.analysis;
  const newRes  = slots[compareTo]?.analysis;
  const oldName = slotNames[compareFrom] || compareFrom;
  const newName = slotNames[compareTo]   || compareTo;
  const feedback = generateLessonFeedback(oldRes, newRes, oldName, newName);
  return (
    <div style={lfStyles.container}>
      <div style={lfStyles.header}>
        <div style={lfStyles.title}>🎙 레슨용 자동 피드백</div>
        <div style={lfStyles.subtitle}>선택한 두 구간의 차이를 보컬 레슨 관점에서 해석한 참고 문장입니다.</div>
        <div style={lfStyles.disclaimer}>의학적 진단이나 절대 판정이 아니라, 같은 조건에서 비교할 때 유용한 보조 지표입니다.</div>
      </div>
      <div style={lfStyles.pairSelector}>
        <span style={lfStyles.pairLabel}>비교 구간 선택</span>
        <div style={lfStyles.pairBtns}>
          {pairs.map(([from, to]) => {
            const isActive = compareFrom === from && compareTo === to;
            return (
              <button key={`${from}-${to}`}
                onClick={() => { setCompareFrom(from); setCompareTo(to); }}
                style={{
                  ...lfStyles.pairBtn,
                  background: isActive ? '#1e1e38' : '#18181f',
                  border: isActive ? `1.5px solid ${SLOT_COLORS[from]}` : '1px solid #2a2a38',
                  boxShadow: isActive ? `0 0 8px ${SLOT_COLORS[from]}44` : 'none',
                }}>
                <span style={{ color: SLOT_COLORS[from], fontWeight: 800 }}>{slotNames[from] || from}</span>
                <span style={{ color: '#6a6a88', margin: '0 3px', fontSize: 11 }}>→</span>
                <span style={{ color: SLOT_COLORS[to], fontWeight: 800 }}>{slotNames[to] || to}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={lfStyles.feedbackList}>
        {feedback.map((item, i) => (
          <div key={i} style={{ ...lfStyles.feedbackItem, borderLeft: `3px solid ${item.color}` }}>
            <span style={{ color: item.color, marginRight: 8, fontSize: 14, flexShrink: 0 }}>●</span>
            <span style={lfStyles.feedbackText}>{item.text}</span>
          </div>
        ))}
      </div>
      <div style={lfStyles.footer}>
        ※ 이 피드백은 음향 수치를 기반으로 한 보컬 레슨용 참고 정보입니다. 의학적 진단이 아니며, 전문 보컬 코치의 판단을 대체하지 않습니다.
      </div>
    </div>
  );
}
